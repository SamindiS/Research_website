<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Gaze Tracking preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06212a"/>
      <stop offset="55%" stop-color="#082b34"/>
      <stop offset="100%" stop-color="#0a1418"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#02B2AA" stop-opacity="0.45"/>
      <stop offset="55%" stop-color="#02B2AA" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#02B2AA" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#02B2AA" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#02B2AA"/>
    </linearGradient>
  </defs>
  <rect width="800" height="480" fill="url(#bg)"/>
  <rect width="800" height="480" fill="url(#grid)"/>
  <rect width="800" height="480" fill="url(#glow)"/>
  <g transform="translate(400 190)" opacity="0.95">
  <ellipse cx="0" cy="0" rx="120" ry="62" fill="none" stroke="#02B2AA" stroke-width="4"/>
  <circle cx="0" cy="0" r="34" fill="none" stroke="#02B2AA" stroke-width="3"/>
  <circle cx="8" cy="-4" r="14" fill="#02B2AA"/>
  <circle cx="12" cy="-8" r="4" fill="#06212a"/>
  <path d="M-160 -70 L-130 -50 M160 -70 L130 -50 M-160 70 L-130 50 M160 70 L130 50" stroke="#02B2AA" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
</g>
  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" text-anchor="middle">
    <text x="400" y="370" font-size="20" letter-spacing="6" fill="#02B2AA" font-weight="700">MODULE 01</text>
    <text x="400" y="420" font-size="44" font-weight="800" fill="url(#title)">Gaze Tracking</text>
  </g>
  <g fill="#02B2AA" opacity="0.6">
    <circle cx="40" cy="40" r="3"/><circle cx="760" cy="40" r="3"/>
    <circle cx="40" cy="440" r="3"/><circle cx="760" cy="440" r="3"/>
  </g>
</svg>